services:

    app:
        extra_hosts:
            - "host.docker.internal:host-gateway"
        build:
            context: .
            dockerfile: ./docker/php/Dockerfile
        volumes:
            - .:/var/www/html

    web:
        image: nginx:latest
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        ports:
            - "80:80"

volumes:
    postgres_data:
