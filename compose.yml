services:

    app:
        build:
            context: .
            dockerfile: ./docker/php/Dockerfile
        container_name: php-fpm
        volumes:
            - .:/var/www/html

    web:
        image: nginx:latest
        container_name: nginx
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        ports:
            - "80:80"
